name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Android APK with Buildozer
      uses: docker://kivy/buildozer:latest
      with:
        args: buildozer android debug
